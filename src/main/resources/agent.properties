# M1 — Real Tool Configuration
hms.uri=thrift://hive-metastore:9083
spark.container=da-spark-master
spark.master=spark://spark-master:7077
profiler.top_k=5
sandbox.preview_limit=100
sandbox.timeout_seconds=120

# M3 — Flink Configuration
flink.container=da-flink-jobmanager
flink.jobmanager=flink-jobmanager:8081

# M5 — Scheduler & Deploy
deploy.submit_script_dir=./output/submit-scripts
deploy.pr_template_dir=./output/pr-templates
deploy.ticket_template_dir=./output/tickets
scheduler.submission_mode=one_shot
scheduler.default_queue=root.prod.wireless

# M5 — Trace
trace.output_dir=./.data-agent/traces
trace.enabled=true
