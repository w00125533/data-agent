name: data-agent

networks:
  data-agent-net:
    driver: bridge

volumes:
  pg-data:
  hdfs-name:
  hdfs-data:

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: da-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - data-agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  hdfs-namenode:
    image: ${HADOOP_IMAGE}
    container_name: da-hdfs-namenode
    hostname: hdfs-namenode
    user: root
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - |
        if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
          $$HADOOP_HOME/bin/hdfs namenode -format -nonInteractive -force
        fi
        $$HADOOP_HOME/bin/hdfs namenode
    restart: unless-stopped
    volumes:
      - hdfs-name:/hadoop/dfs/name
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    ports:
      - "${HDFS_NAMENODE_PORT}:9870"
      - "${HDFS_NAMENODE_RPC_PORT}:8020"
    networks:
      - data-agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  hdfs-datanode:
    image: ${HADOOP_IMAGE}
    container_name: da-hdfs-datanode
    hostname: hdfs-datanode
    user: root
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - $$HADOOP_HOME/bin/hdfs datanode
    restart: unless-stopped
    volumes:
      - hdfs-data:/hadoop/dfs/data
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    networks:
      - data-agent-net
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  hive-metastore:
    image: ${HIVE_IMAGE}
    container_name: da-hive-metastore
    hostname: hive-metastore
    user: root
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
    command: ["bash", "/opt/hive/entrypoint.sh"]
    restart: unless-stopped
    volumes:
      - ./docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./docker/hive/entrypoint.sh:/opt/hive/entrypoint.sh:ro
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
    ports:
      - "${HMS_PORT}:9083"
    networks:
      - data-agent-net
    depends_on:
      postgres:
        condition: service_healthy
      hdfs-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  spark-master:
    image: ${SPARK_IMAGE}
    container_name: da-spark-master
    hostname: spark-master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./docker/hive/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/bitnami/spark/conf/hdfs-site.xml:ro
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
    networks:
      - data-agent-net
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  spark-worker:
    image: ${SPARK_IMAGE}
    container_name: da-spark-worker
    hostname: spark-worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./docker/hive/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/bitnami/spark/conf/hdfs-site.xml:ro
    networks:
      - data-agent-net
    depends_on:
      spark-master:
        condition: service_healthy

  flink-jobmanager:
    image: ${FLINK_IMAGE}
    container_name: da-flink-jobmanager
    hostname: flink-jobmanager
    restart: unless-stopped
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./docker/flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./docker/hive/hive-site.xml:/opt/flink/conf/hive-site.xml:ro
    ports:
      - "${FLINK_JOBMANAGER_PORT}:8081"
    networks:
      - data-agent-net
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/overview || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  flink-taskmanager:
    image: ${FLINK_IMAGE}
    container_name: da-flink-taskmanager
    hostname: flink-taskmanager
    restart: unless-stopped
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./docker/flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./docker/hive/hive-site.xml:/opt/flink/conf/hive-site.xml:ro
    networks:
      - data-agent-net
    depends_on:
      flink-jobmanager:
        condition: service_healthy

  kafka:
    image: ${KAFKA_IMAGE}
    container_name: da-kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "${KAFKA_BROKER_PORT}:9092"
    networks:
      - data-agent-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
