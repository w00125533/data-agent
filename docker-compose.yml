name: data-agent

networks:
  data-agent-net:
    driver: bridge

volumes:
  pg-data:
  hdfs-name:
  hdfs-data:

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: da-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - data-agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  hdfs-namenode:
    image: ${HADOOP_IMAGE}
    container_name: da-hdfs-namenode
    hostname: hdfs-namenode
    user: root
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - |
        if [ ! -f /hadoop/dfs/name/current/VERSION ]; then
          $$HADOOP_HOME/bin/hdfs namenode -format -nonInteractive -force
        fi
        $$HADOOP_HOME/bin/hdfs namenode
    restart: unless-stopped
    volumes:
      - hdfs-name:/hadoop/dfs/name
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    ports:
      - "${HDFS_NAMENODE_PORT}:9870"
      - "${HDFS_NAMENODE_RPC_PORT}:8020"
    networks:
      - data-agent-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  hdfs-datanode:
    image: ${HADOOP_IMAGE}
    container_name: da-hdfs-datanode
    hostname: hdfs-datanode
    user: root
    environment:
      HADOOP_HOME: /opt/hadoop
    command:
      - bash
      - -c
      - $$HADOOP_HOME/bin/hdfs datanode
    restart: unless-stopped
    volumes:
      - hdfs-data:/hadoop/dfs/data
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml:ro
    networks:
      - data-agent-net
    depends_on:
      hdfs-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9864 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  hive-metastore:
    image: ${HIVE_IMAGE}
    container_name: da-hive-metastore
    hostname: hive-metastore
    user: root
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
    command: ["bash", "/opt/hive/entrypoint.sh"]
    restart: unless-stopped
    volumes:
      - ./docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./docker/hive/entrypoint.sh:/opt/hive/entrypoint.sh:ro
      - ./docker/hadoop/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
    ports:
      - "${HMS_PORT}:9083"
    networks:
      - data-agent-net
    depends_on:
      postgres:
        condition: service_healthy
      hdfs-namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  spark-master:
    image: ${SPARK_IMAGE}
    container_name: da-spark-master
    hostname: spark-master
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8080
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./docker/hive/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/bitnami/spark/conf/hdfs-site.xml:ro
    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_WEBUI_PORT}:8080"
    networks:
      - data-agent-net
    depends_on:
      hive-metastore:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  spark-worker:
    image: ${SPARK_IMAGE}
    container_name: da-spark-worker
    hostname: spark-worker
    restart: unless-stopped
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES}
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - ./docker/hive/hive-site.xml:/opt/bitnami/spark/conf/hive-site.xml:ro
      - ./docker/hadoop/core-site.xml:/opt/bitnami/spark/conf/core-site.xml:ro
      - ./docker/hadoop/hdfs-site.xml:/opt/bitnami/spark/conf/hdfs-site.xml:ro
    networks:
      - data-agent-net
    depends_on:
      spark-master:
        condition: service_healthy
